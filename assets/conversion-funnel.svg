    <text x="360" y="640" fill="#0d47a1" font-family="Arial" font-size="28" font-weight="700">4. Удержание</text>
    <text x="760" y="640" fill="#0d47a1" font-family="Arial" font-size="24" font-weight="700">40%</text>
