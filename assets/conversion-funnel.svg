<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="funnel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565c0" />
      <stop offset="100%" stop-color="#81d4fa" />
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="700" fill="#121d3a" rx="20" />
  <text x="80" y="80" fill="#ffffff" font-family="Arial" font-size="36" font-weight="700">Маркетинговая воронка продукта</text>
  <text x="80" y="120" fill="#cfd8dc" font-family="Arial" font-size="18">Как Reminder App Wind11 превращает внимание в действие и результат.</text>

  <g>
    <rect x="120" y="180" width="960" height="110" rx="24" fill="#1e88e5" opacity="0.95" />
    <text x="180" y="245" fill="#ffffff" font-family="Arial" font-size="28" font-weight="700">1. Привлечение</text>
    <text x="180" y="280" fill="#e3f2fd" font-family="Arial" font-size="16">Аудитория узнаёт про преимущества продуктивности.</text>
    <text x="880" y="245" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">95%</text>
  </g>

  <g>
    <rect x="160" y="320" width="840" height="110" rx="24" fill="#42a5f5" opacity="0.92" />
    <text x="200" y="385" fill="#ffffff" font-family="Arial" font-size="28" font-weight="700">2. Вовлечение</text>
    <text x="200" y="420" fill="#e3f2fd" font-family="Arial" font-size="16">Пользователь пробует интерфейс, создаёт первые напоминания.</text>
    <text x="870" y="385" fill="#ffffff" font-family="Arial" font-size="24" font-weight="700">78%</text>
  </g>

  <g>
    <rect x="220" y="460" width="660" height="110" rx="24" fill="#90caf9" opacity="0.9" />
    <text x="260" y="525" fill="#0d47a1" font-family="Arial" font-size="28" font-weight="700">3. Конверсия</text>
    <text x="260" y="560" fill="#263238" font-family="Arial" font-size="16">Системные сообщения и popup удерживают пользователя в процессе.</text>
    <text x="820" y="525" fill="#0d47a1" font-family="Arial" font-size="24" font-weight="700">62%</text>
  </g>

  <g>
